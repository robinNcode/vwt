version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vwt-backend
    restart: unless-stopped
    ports:
      - "8083:8083"
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
    environment:
      - APP_ENV=local
      - APP_PORT=8083
      - DB_CONNECTION=mysql
      - DB_HOST=192.168.26.65
      - DB_PORT=3306
      - DB_DATABASE=vwt_v1
      - DB_USERNAME=robin_ip_user
      - DB_PASSWORD=dsnext79
      - JWT_SECRET=dev-secret-key-123
    networks:
      - vwt-network

networks:
  vwt-network:
    driver: bridge
