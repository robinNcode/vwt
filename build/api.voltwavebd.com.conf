<VirtualHost *:80>
    ServerName api.voltwavebd.com

    # Proxy all requests to the Go API binary running on port 8083
    ProxyPreserveHost On
    ProxyRequests Off

    ProxyPass / http://127.0.0.1:8083/
    ProxyPassReverse / http://127.0.0.1:8083/

    # Forward the real client IP to the Go backend
    RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
    RequestHeader set X-Forwarded-Proto "http"

    ErrorLog ${APACHE_LOG_DIR}/api.voltwavebd.com.error.log
    CustomLog ${APACHE_LOG_DIR}/api.voltwavebd.com.access.log combined
</VirtualHost>
